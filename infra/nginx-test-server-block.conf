# test.date-planner.us server block
# ~/infra/nginx/conf.d/ai-planner.conf 파일에 기존 운영 블록 아래에 추가

server {
    listen 80;
    server_name test.date-planner.us;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name test.date-planner.us;

    # 와일드카드 인증서가 있으면 아래 경로 사용; 없으면 certbot 으로 단독 발급
    # certbot certonly --webroot -w /var/www/certbot -d test.date-planner.us
    ssl_certificate     /etc/letsencrypt/live/date-planner.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/date-planner.us/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API → test backend (4100 → 4000 내부)
    location /api/ {
        proxy_pass http://ai-planner-backend-test:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend → test frontend (3100 → 3000 내부)
    location / {
        proxy_pass http://ai-planner-frontend-test:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
