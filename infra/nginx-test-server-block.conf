# HTTP → HTTPS redirect
server {
  listen 80;
  server_name date-planner.us www.date-planner.us;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://date-planner.us$request_uri;
  }
}

# www → non-www redirect (HTTPS)
server {
  listen 443 ssl;
  server_name www.date-planner.us;

  ssl_certificate     /etc/letsencrypt/live/date-planner.us/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/date-planner.us/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;

  return 301 https://date-planner.us$request_uri;
}

# Main HTTPS server
server {
  listen 443 ssl;
  http2 on;
  server_name date-planner.us;

  ssl_certificate     /etc/letsencrypt/live/date-planner.us/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/date-planner.us/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;

  include /etc/nginx/snippets/security-headers.conf;

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 "healthy\n";
  }

  location ^~ /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    set $fe http://ai-planner-frontend:3000;
    proxy_pass $fe;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  location ~* \.(?:jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    set $fe http://ai-planner-frontend:3000;
    proxy_pass $fe;
    include /etc/nginx/snippets/proxy-common.conf;
  }

  # Frontend admin API routes (Next.js route handlers)
  location ^~ /api/admin/ {
    set $fe http://ai-planner-frontend:3000;
    proxy_pass         $fe;
    include /etc/nginx/snippets/proxy-common.conf;
    include /etc/nginx/snippets/proxy-upgrade.conf;
  }

  # Backend API
  location /api/ {
    set $be http://ai-planner-backend:4000;
    proxy_pass         $be;
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_read_timeout 120s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;

    add_header Access-Control-Allow-Origin "https://date-planner.us" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = 'OPTIONS') {
      add_header Access-Control-Allow-Origin "https://date-planner.us";
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
      add_header Access-Control-Max-Age 86400;
      add_header Content-Type 'text/plain; charset=utf-8';
      add_header Content-Length 0;
      return 204;
    }
  }

  # Frontend (Next.js)
  location / {
    set $fe http://ai-planner-frontend:3000;
    proxy_pass         $fe;
    include /etc/nginx/snippets/proxy-common.conf;
    include /etc/nginx/snippets/proxy-upgrade.conf;
  }
}

# HTTP: test.date-planner.us (HTTP-only until SSL cert is issued)
server {
  listen 80;
  server_name test.date-planner.us;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS: test.date-planner.us
