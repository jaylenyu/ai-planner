name: Deploy Canary

on:
  push:
    branches: [canary]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/canary.yml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-planner-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-planner-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  build-backend:
    name: Build & Push Canary Backend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push canary backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:canary,${{ env.IMAGE_BACKEND }}:canary-${{ github.sha }}
          cache-from: type=gha,scope=backend-canary
          cache-to: type=gha,scope=backend-canary,mode=max

  build-frontend:
    name: Build & Push Canary Frontend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push canary frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:canary,${{ env.IMAGE_FRONTEND }}:canary-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://test.date-planner.us/api
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${{ secrets.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }}
            NEXT_PUBLIC_TOSS_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          cache-from: type=gha,scope=frontend-canary
          cache-to: type=gha,scope=frontend-canary,mode=max

  deploy:
    name: Deploy Canary Containers
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.frontend_changed == 'true' || needs.changes.outputs.backend_changed == 'true')
    steps:
      - name: Deploy canary backend/frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            STACK_DIR=/srv/apps/ai-planner-canary
            ENV_FILE=$STACK_DIR/.env
            BACKEND_CHANGED=${{ needs.changes.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ needs.changes.outputs.frontend_changed }}
            BACKEND_CONTAINER=ai-planner-canary-backend
            FRONTEND_CONTAINER=ai-planner-canary-frontend
            BACKEND_PORT=4101
            FRONTEND_PORT=3101

            mkdir -p "$STACK_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              cp /srv/apps/ai-planner/.env "$ENV_FILE"
            fi

            upsert_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
              fi
            }

            upsert_env NEXT_PUBLIC_TOSS_CLIENT_KEY '${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}'
            upsert_env TOSS_SECRET_KEY '${{ secrets.TOSS_SECRET_KEY }}'
            upsert_env TOSS_WEBHOOK_SECRET '${{ secrets.TOSS_WEBHOOK_SECRET }}'
            upsert_env APP_URL "http://localhost:${BACKEND_PORT}"
            upsert_env FRONTEND_URL "http://localhost:${FRONTEND_PORT}"
            upsert_env CORS_ORIGIN "http://localhost:${FRONTEND_PORT}"

            DB_NETWORK=$(docker inspect ai-planner-postgres --format '{{range $k, $v := .NetworkSettings.Networks}}{{println $k}}{{end}}' | head -n1 | tr -d '[:space:]')
            if [ -z "$DB_NETWORK" ]; then
              echo "Failed to detect production database network"
              exit 1
            fi

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker image prune -af >/dev/null 2>&1 || true
            docker builder prune -af >/dev/null 2>&1 || true

            if [ "$BACKEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_BACKEND }}:canary
              docker rm -f "$BACKEND_CONTAINER" >/dev/null 2>&1 || true
              docker run -d \
                --name "$BACKEND_CONTAINER" \
                --restart unless-stopped \
                --env-file "$ENV_FILE" \
                -p "${BACKEND_PORT}:4000" \
                --network "$DB_NETWORK" \
                ${{ env.IMAGE_BACKEND }}:canary
            fi

            if [ "$FRONTEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_FRONTEND }}:canary
              docker rm -f "$FRONTEND_CONTAINER" >/dev/null 2>&1 || true
              docker run -d \
                --name "$FRONTEND_CONTAINER" \
                --restart unless-stopped \
                -p "${FRONTEND_PORT}:3000" \
                ${{ env.IMAGE_FRONTEND }}:canary
            fi

      - name: Canary health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            BACKEND_CHANGED=${{ needs.changes.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ needs.changes.outputs.frontend_changed }}
            BACKEND_PORT=4101
            FRONTEND_PORT=3101
            MAX_RETRY=30

            wait_for_http() {
              local url="$1"
              local label="$2"
              local count=0
              until curl -fsS "$url" >/dev/null; do
                count=$((count + 1))
                if [ "$count" -ge "$MAX_RETRY" ]; then
                  echo "$label failed to respond"
                  exit 1
                fi
                echo "Waiting for $label... ($count/$MAX_RETRY)"
                sleep 3
              done
              echo "$label healthy!"
            }

            if [ "$BACKEND_CHANGED" = "true" ]; then
              wait_for_http "http://localhost:${BACKEND_PORT}/health" "canary backend"
            fi

            if [ "$FRONTEND_CHANGED" = "true" ]; then
              wait_for_http "http://localhost:${FRONTEND_PORT}" "canary frontend"
            fi

      - name: Canary smoke test
        if: needs.changes.outputs.backend_changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            BACKEND_CONTAINER=ai-planner-canary-backend

            TOKEN=$(docker exec "$BACKEND_CONTAINER" node -e "const {PrismaClient}=require('@prisma/client'); const jwt=require('jsonwebtoken'); (async()=>{ const prisma=new PrismaClient(); const user=await prisma.user.findFirst({select:{id:true,email:true}}); if(!user){console.error('NO_USER'); process.exit(2);} if(!process.env.JWT_SECRET){console.error('NO_JWT_SECRET'); process.exit(3);} const token=jwt.sign({sub:user.id,email:user.email}, process.env.JWT_SECRET, {expiresIn:'10m'}); console.log(token); await prisma.\$disconnect(); })().catch(async(e)=>{console.error(e?.message||e); process.exit(4);});")
            if [ -z "$TOKEN" ]; then
              echo "[canary] token generation failed"
              exit 1
            fi

            curl -fsS \
              -H "Authorization: Bearer $TOKEN" \
              http://localhost:4101/api/subscription/status >/tmp/canary-subscription.json

            cat /tmp/canary-subscription.json
            LOGS=$(docker logs --since "$START_TS" "$BACKEND_CONTAINER" 2>&1 || true)
            echo "$LOGS" | tail -80

  deploy-test:
    name: Deploy Test Stack
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend, deploy]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.frontend_changed == 'true' || needs.changes.outputs.backend_changed == 'true')
    steps:
      - name: Pull images and restart test containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -euo pipefail
            STACK_DIR=/srv/apps/ai-planner-test
            COMPOSE_FILE=$STACK_DIR/compose.yml
            ENV_FILE=$STACK_DIR/.env
            BACKEND_CHANGED=${{ needs.changes.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ needs.changes.outputs.frontend_changed }}

            upsert_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
              fi
            }

            upsert_env APP_URL 'https://test.date-planner.us'
            upsert_env FRONTEND_URL 'https://test.date-planner.us'
            upsert_env CORS_ORIGIN 'https://test.date-planner.us'
            upsert_env SEED_ADMIN_EMAIL 'jaylenyu96@gmail.com'
            upsert_env SEED_ADMIN_PASSWORD 'Admin1234!'
            upsert_env SEED_PUBLICADMIN_EMAIL 'publicadmin@ai-planner.local'
            upsert_env SEED_PUBLICADMIN_PASSWORD 'PublicAdmin1234!'
            upsert_env NEXT_PUBLIC_TOSS_CLIENT_KEY '${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}'
            upsert_env NEXT_PUBLIC_SENTRY_DSN '${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}'
            upsert_env SENTRY_DSN '${{ secrets.SENTRY_DSN }}'
            upsert_env SENTRY_AUTH_TOKEN '${{ secrets.SENTRY_AUTH_TOKEN }}'
            upsert_env SENTRY_ORG '${{ secrets.SENTRY_ORG }}'
            upsert_env SENTRY_PROJECT '${{ secrets.SENTRY_PROJECT }}'
            upsert_env TOSS_SECRET_KEY '${{ secrets.TOSS_SECRET_KEY }}'
            upsert_env TOSS_WEBHOOK_SECRET '${{ secrets.TOSS_WEBHOOK_SECRET }}'

            docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" config >/dev/null
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker image prune -af >/dev/null 2>&1 || true

            SERVICES=""
            if [ "$BACKEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_BACKEND }}:canary
              SERVICES="$SERVICES backend"
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_FRONTEND }}:canary
              SERVICES="$SERVICES frontend"
            fi

            if [ -z "$SERVICES" ]; then
              echo "No services to update — skipping"
              exit 0
            fi

            docker compose \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              up -d --no-build $SERVICES

      - name: Test health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            BACKEND_CHANGED=${{ needs.changes.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ needs.changes.outputs.frontend_changed }}
            MAX_RETRY=20

            wait_for_health() {
              CONTAINER_NAME="$1"
              LABEL="$2"
              COUNT=0
              until docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null | grep -q "healthy"; do
                COUNT=$((COUNT + 1))
                if [ "$COUNT" -ge "$MAX_RETRY" ]; then
                  echo "$LABEL failed to become healthy"
                  docker logs --tail 30 "$CONTAINER_NAME"
                  exit 1
                fi
                echo "Waiting for $LABEL... ($COUNT/$MAX_RETRY)"
                sleep 3
              done
              echo "$LABEL healthy!"
            }

            if [ "$BACKEND_CHANGED" = "true" ]; then
              wait_for_health ai-planner-backend-test backend-test
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              wait_for_health ai-planner-frontend-test frontend-test
            fi

            docker compose -f /srv/apps/ai-planner-test/compose.yml --env-file /srv/apps/ai-planner-test/.env ps

      - name: Seed admin users in test database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            docker exec ai-planner-backend-test node - <<'NODE'
            const bcrypt = require('bcrypt');
            const { PrismaClient } = require('@prisma/client');

            const prisma = new PrismaClient();

            async function upsertAdmin(email, password, adminReadOnly) {
              const hashedPassword = await bcrypt.hash(password, 10);
              const user = await prisma.user.upsert({
                where: { email },
                update: {
                  password: hashedPassword,
                  emailVerified: true,
                  role: 'ADMIN',
                  adminReadOnly,
                  isSuspended: false,
                },
                create: {
                  email,
                  password: hashedPassword,
                  emailVerified: true,
                  role: 'ADMIN',
                  adminReadOnly,
                },
              });
              await prisma.refreshToken.deleteMany({ where: { userId: user.id } });
            }

            async function main() {
              await upsertAdmin(
                process.env.SEED_ADMIN_EMAIL || 'jaylenyu96@gmail.com',
                process.env.SEED_ADMIN_PASSWORD || 'Admin1234!',
                false,
              );
              await upsertAdmin(
                process.env.SEED_PUBLICADMIN_EMAIL || 'publicadmin@ai-planner.local',
                process.env.SEED_PUBLICADMIN_PASSWORD || 'PublicAdmin1234!',
                true,
              );
              console.log('Seeded admin and publicadmin users');
            }

            main()
              .catch((error) => {
                console.error(error);
                process.exit(1);
              })
              .finally(async () => {
                await prisma.$disconnect();
              });
            NODE
