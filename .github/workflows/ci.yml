name: CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: No backend changes
        if: needs.changes.outputs.backend_changed != 'true'
        run: echo "No backend changes detected."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.backend_changed == 'true'

      - name: Setup Node.js
        if: needs.changes.outputs.backend_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.backend_changed == 'true'
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        if: needs.changes.outputs.backend_changed == 'true'
        working-directory: backend
        run: npx prisma generate

      - name: Set up Docker Buildx
        if: needs.changes.outputs.backend_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Typecheck
        if: needs.changes.outputs.backend_changed == 'true'
        working-directory: backend
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Lint
        if: needs.changes.outputs.backend_changed == 'true'
        working-directory: backend
        run: npm run lint:check

      - name: Docker dry-run build
        if: needs.changes.outputs.backend_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,scope=backend-ci,mode=max

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: No frontend changes
        if: needs.changes.outputs.frontend_changed != 'true'
        run: echo "No frontend changes detected."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.frontend_changed == 'true'

      - name: Setup Node.js
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        if: needs.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        if: needs.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm run lint:check

      - name: Set up Docker Buildx
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker dry-run build
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=dummy
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,scope=frontend-ci,mode=max
