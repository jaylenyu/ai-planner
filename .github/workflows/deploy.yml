name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force build and deploy all services'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-planner-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-planner-frontend

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend || inputs.force_deploy }}
      backend: ${{ steps.filter.outputs.backend || inputs.force_deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Backend — install, typecheck, lint
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx tsc -p tsconfig.build.json --noEmit
          npm run lint

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install, typecheck, lint
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run lint

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${{ secrets.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    steps:
      - name: Pull images and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e
            COMPOSE_FILE=~/infra/docker-compose.ai-planner.prod.yml
            ENV_FILE=~/ai-planner/.env
            if grep -q "^KAKAO_REST_API_KEY=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^KAKAO_REST_API_KEY=.*|KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}|" "$ENV_FILE"
            else
              echo "KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}" >> "$ENV_FILE"
            fi
            if ! grep -q "^[[:space:]]*KAKAO_REST_API_KEY:" "$COMPOSE_FILE"; then
              sed -i '/NAVER_CLIENT_SECRET:/a\      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}' "$COMPOSE_FILE"
            fi
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }} \
            docker compose -p ai-planner -f "$COMPOSE_FILE" --env-file "$ENV_FILE" config >/dev/null
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }} \
            docker compose \
              -p ai-planner \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              down --remove-orphans || true
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }} \
            docker compose \
              -p ai-planner \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              up -d --no-build
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -e
            MAX_RETRY=12
            COUNT=0
            until docker inspect --format='{{.State.Health.Status}}' ai-planner-backend 2>/dev/null | grep -q "healthy"; do
              COUNT=$((COUNT + 1))
              if [ "$COUNT" -ge "$MAX_RETRY" ]; then
                echo "Backend failed to become healthy"
                docker logs --tail 30 ai-planner-backend
                exit 1
              fi
              echo "Waiting for backend... ($COUNT/$MAX_RETRY)"
              sleep 10
            done
            echo "Backend healthy!"

            COUNT=0
            until docker inspect --format='{{.State.Health.Status}}' ai-planner-frontend 2>/dev/null | grep -q "healthy"; do
              COUNT=$((COUNT + 1))
              if [ "$COUNT" -ge "$MAX_RETRY" ]; then
                echo "Frontend failed to become healthy"
                docker logs --tail 30 ai-planner-frontend
                exit 1
              fi
              echo "Waiting for frontend... ($COUNT/$MAX_RETRY)"
              sleep 10
            done
            echo "Frontend healthy!"
            echo "Deploy complete!"
            docker compose -p ai-planner -f ~/infra/docker-compose.ai-planner.prod.yml ps
            # Kakao 키 컨테이너 전달 여부 확인
            if docker exec ai-planner-backend printenv KAKAO_REST_API_KEY 2>/dev/null | grep -q .; then
              echo "[verify] KAKAO_REST_API_KEY: OK in container"
            else
              echo "[verify] KAKAO_REST_API_KEY: MISSING — compose 파일 확인 필요:"
              grep -A 40 "backend:" ~/infra/docker-compose.ai-planner.prod.yml | head -50
              exit 1
            fi

      - name: Smoke test Kakao place search
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -e
            START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            TOKEN=$(docker exec ai-planner-backend node -e "const {PrismaClient}=require('@prisma/client'); const jwt=require('jsonwebtoken'); (async()=>{ const prisma=new PrismaClient(); const user=await prisma.user.findFirst({select:{id:true,email:true}}); if(!user){console.error('NO_USER'); process.exit(2);} if(!process.env.JWT_SECRET){console.error('NO_JWT_SECRET'); process.exit(3);} const token=jwt.sign({sub:user.id,email:user.email}, process.env.JWT_SECRET, {expiresIn:'10m'}); console.log(token); await prisma.\$disconnect(); })().catch(async(e)=>{console.error(e?.message||e); process.exit(4);});")
            if [ -z "$TOKEN" ]; then
              echo "[smoke] token generation failed"
              exit 1
            fi

            docker exec -e TOKEN="$TOKEN" ai-planner-backend node -e "(async()=>{const r=await fetch('http://localhost:4000/api/plan/generate',{method:'POST',headers:{Authorization:'Bearer '+process.env.TOKEN,'Content-Type':'application/json'},body:JSON.stringify({rawInput:'연남동에서 피자 먹고 싶어.',mode:'date'})}); if(!r.ok){console.error('SMOKE_STATUS_'+r.status); process.exit(1);} console.log('SMOKE_STATUS_'+r.status);})().catch((e)=>{console.error(e?.message||e);process.exit(1);});"

            sleep 2
            LOGS=$(docker logs --since "$START_TS" ai-planner-backend 2>&1 || true)
            echo "$LOGS" | tail -120

            if echo "$LOGS" | grep -q "Kakao REST API 키 없음"; then
              echo "[smoke] FAIL: Kakao REST API key warning exists"
              exit 1
            fi

            if ! echo "$LOGS" | grep -Eq "\\[food\\] 통합 [0-9]+개 \\(Naver [0-9]+, Kakao [1-9][0-9]*\\)"; then
              echo "[smoke] FAIL: food merge log does not show Kakao >= 1"
              exit 1
            fi

            if echo "$LOGS" | grep -q "source=ai"; then
              echo "[smoke] FAIL: source=ai detected"
              exit 1
            fi

            echo "[smoke] PASS: Kakao results included, no missing-key warning, no source=ai"
