name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-planner-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-planner-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${{ secrets.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }}
            NEXT_PUBLIC_TOSS_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_ADMIN_PUBLIC_LOGIN_ENABLED=false
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.frontend_changed == 'true' || needs.changes.outputs.backend_changed == 'true')
    steps:
      - name: Pull images and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -euo pipefail
            STACK_DIR=/srv/apps/ai-planner
            COMPOSE_FILE=$STACK_DIR/compose.yml
            ENV_FILE=$STACK_DIR/.env
            BACKEND_CHANGED=${{ needs.changes.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ needs.changes.outputs.frontend_changed }}

            upsert_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
              fi
            }

            upsert_env_if_present() {
              local key="$1"
              local value="$2"
              if [ -n "$value" ]; then
                upsert_env "$key" "$value"
              else
                echo "[env] $key secret is empty; preserving existing env file value"
              fi
            }

            upsert_env NEXT_PUBLIC_TOSS_CLIENT_KEY '${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}'
            upsert_env NEXT_PUBLIC_SENTRY_DSN '${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}'
            upsert_env SENTRY_DSN '${{ secrets.SENTRY_DSN }}'
            upsert_env SENTRY_AUTH_TOKEN '${{ secrets.SENTRY_AUTH_TOKEN }}'
            upsert_env SENTRY_ORG '${{ secrets.SENTRY_ORG }}'
            upsert_env SENTRY_PROJECT '${{ secrets.SENTRY_PROJECT }}'
            upsert_env SEED_ADMIN_EMAIL '${{ secrets.SEED_ADMIN_EMAIL }}'
            upsert_env SEED_ADMIN_PASSWORD '${{ secrets.SEED_ADMIN_PASSWORD }}'
            upsert_env SEED_PUBLIC_ADMIN_EMAIL '${{ secrets.SEED_PUBLIC_ADMIN_EMAIL }}'
            upsert_env SEED_PUBLIC_ADMIN_PASSWORD '${{ secrets.SEED_PUBLIC_ADMIN_PASSWORD }}'
            upsert_env ADMIN_PUBLIC_LOGIN_ENABLED 'false'
            upsert_env AWS_REGION '${{ secrets.AWS_REGION }}'
            upsert_env AWS_ACCESS_KEY_ID '${{ secrets.AWS_ACCESS_KEY_ID }}'
            upsert_env AWS_SECRET_ACCESS_KEY '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
            upsert_env CLOUDWATCH_LOG_GROUP_BACKEND '/ai-planner/backend'
            upsert_env CLOUDWATCH_LOG_GROUP_FRONTEND '/ai-planner/frontend'
            upsert_env BACKEND_URL 'http://ai-planner-backend:4000'
            upsert_env TOSS_SECRET_KEY '${{ secrets.TOSS_SECRET_KEY }}'
            upsert_env TOSS_WEBHOOK_SECRET '${{ secrets.TOSS_WEBHOOK_SECRET }}'
            upsert_env_if_present EMAIL_HOST '${{ secrets.EMAIL_HOST }}'
            upsert_env_if_present EMAIL_PORT '${{ secrets.EMAIL_PORT }}'
            upsert_env_if_present EMAIL_USER '${{ secrets.EMAIL_USER }}'
            upsert_env_if_present EMAIL_PASS '${{ secrets.EMAIL_PASS }}'
            upsert_env_if_present EMAIL_FROM '${{ secrets.EMAIL_FROM }}'
            upsert_env_if_present GA4_PROPERTY_ID '${{ secrets.GA4_PROPERTY_ID }}'
            upsert_env_if_present GA4_CLIENT_EMAIL '${{ secrets.GA4_CLIENT_EMAIL }}'
            upsert_env_if_present GA4_PRIVATE_KEY '${{ secrets.GA4_PRIVATE_KEY }}'

            docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" config >/dev/null
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            sudo journalctl --vacuum-size=100M 2>/dev/null || true
            docker image prune -af >/dev/null 2>&1 || true
            docker builder prune -af >/dev/null 2>&1 || true

            SERVICES=""
            if [ "$BACKEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_BACKEND }}:latest
              SERVICES="$SERVICES backend"
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_FRONTEND }}:latest
              SERVICES="$SERVICES frontend"
            fi

            docker compose \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              up -d --no-build $SERVICES

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            BACKEND_CHANGED=${{ needs.changes.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ needs.changes.outputs.frontend_changed }}
            MAX_RETRY=20

            wait_for_health() {
              CONTAINER_NAME="$1"
              LABEL="$2"
              COUNT=0
              until docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null | grep -q "healthy"; do
                COUNT=$((COUNT + 1))
                if [ "$COUNT" -ge "$MAX_RETRY" ]; then
                  echo "$LABEL failed to become healthy"
                  docker logs --tail 30 "$CONTAINER_NAME"
                  exit 1
                fi
                echo "Waiting for $LABEL... ($COUNT/$MAX_RETRY)"
                sleep 3
              done
              echo "$LABEL healthy!"
            }

            if [ "$BACKEND_CHANGED" = "true" ]; then
              wait_for_health ai-planner-backend backend
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              wait_for_health ai-planner-frontend frontend
            fi

            echo "Deploy complete!"
            docker compose -f /srv/apps/ai-planner/compose.yml --env-file /srv/apps/ai-planner/.env ps
            if [ "$BACKEND_CHANGED" = "true" ]; then
              if docker exec ai-planner-backend printenv KAKAO_REST_API_KEY 2>/dev/null | grep -q .; then
                echo "[verify] KAKAO_REST_API_KEY: OK in container"
              else
                echo "[verify] KAKAO_REST_API_KEY: MISSING — compose 파일 확인 필요:"
                grep -A 40 "backend:" /srv/apps/ai-planner/compose.yml | head -50
                exit 1
              fi
              for KEY in EMAIL_HOST EMAIL_PORT EMAIL_USER EMAIL_PASS EMAIL_FROM; do
                if docker exec ai-planner-backend printenv "$KEY" 2>/dev/null | grep -q .; then
                  echo "[verify] $KEY: OK in container"
                else
                  echo "[verify] $KEY: MISSING — compose/.env 확인 필요:"
                  grep -A 50 "backend:" /srv/apps/ai-planner/compose.yml | head -60
                  exit 1
                fi
              done
              if docker exec ai-planner-backend printenv GOOGLE_CLIENT_ID 2>/dev/null | grep -q . \
                && docker exec ai-planner-backend printenv GOOGLE_CLIENT_SECRET 2>/dev/null | grep -q . \
                && docker exec ai-planner-backend printenv GOOGLE_CALLBACK_URL 2>/dev/null | grep -q .; then
                echo "[verify] GOOGLE_OAUTH_ENV: OK in container"
              else
                echo "[verify] GOOGLE_OAUTH_ENV: MISSING — compose/.env 확인 필요:"
                grep -A 50 "backend:" /srv/apps/ai-planner/compose.yml | head -60
                exit 1
              fi
            fi

      - name: Smoke test Kakao place search
        if: needs.changes.outputs.backend_changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -e
            START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            TOKEN=$(docker exec ai-planner-backend node -e "const {PrismaClient}=require('@prisma/client'); const jwt=require('jsonwebtoken'); (async()=>{ const prisma=new PrismaClient(); const user=await prisma.user.findFirst({select:{id:true,email:true}}); if(!user){console.error('NO_USER'); process.exit(2);} if(!process.env.JWT_SECRET){console.error('NO_JWT_SECRET'); process.exit(3);} const token=jwt.sign({sub:user.id,email:user.email}, process.env.JWT_SECRET, {expiresIn:'10m'}); console.log(token); await prisma.\$disconnect(); })().catch(async(e)=>{console.error(e?.message||e); process.exit(4);});")
            if [ -z "$TOKEN" ]; then
              echo "[smoke] token generation failed"
              exit 1
            fi

            docker exec -e TOKEN="$TOKEN" ai-planner-backend node -e "(async()=>{const r=await fetch('http://localhost:4000/api/plan/generate',{method:'POST',headers:{Authorization:'Bearer '+process.env.TOKEN,'Content-Type':'application/json'},body:JSON.stringify({rawInput:'연남동에서 피자 먹고 싶어.',mode:'date'})}); if(!r.ok){console.error('SMOKE_STATUS_'+r.status); process.exit(1);} console.log('SMOKE_STATUS_'+r.status);})().catch((e)=>{console.error(e?.message||e);process.exit(1);});"

            sleep 2
            LOGS=$(docker logs --since "$START_TS" ai-planner-backend 2>&1 || true)
            echo "$LOGS" | tail -120

            if echo "$LOGS" | grep -q "Kakao REST API 키 없음"; then
              echo "[smoke] FAIL: Kakao REST API key warning exists"
              exit 1
            fi

            if ! echo "$LOGS" | grep -Eq "food\\] 통합 [0-9]+개 \\(Naver [0-9]+, Kakao [1-9][0-9]*\\)"; then
              echo "[smoke] FAIL: food merge log does not show Kakao >= 1"
              exit 1
            fi

            if echo "$LOGS" | grep -q "source=ai"; then
              echo "[smoke] FAIL: source=ai detected"
              exit 1
            fi

            echo "[smoke] PASS: Kakao results included, no missing-key warning, no source=ai"

      - name: Seed admin users in production database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            ENV_FILE=/srv/apps/ai-planner/.env
            cat > /tmp/seed_admin_users.js <<'NODE'
            const bcrypt = require('bcrypt');
            const { PrismaClient } = require('@prisma/client');

            const prisma = new PrismaClient();

            async function upsertAdmin(email, password, adminReadOnly) {
              const hashedPassword = await bcrypt.hash(password, 10);
              const nickname = email.split('@')[0] || 'admin';
              const user = await prisma.user.upsert({
                where: { email },
                update: {
                  password: hashedPassword,
                  nickname,
                  emailVerified: true,
                  role: 'ADMIN',
                  adminReadOnly,
                  isSuspended: false,
                },
                create: {
                  email,
                  nickname,
                  password: hashedPassword,
                  emailVerified: true,
                  role: 'ADMIN',
                  adminReadOnly,
                },
              });
              await prisma.refreshToken.deleteMany({ where: { userId: user.id } });
            }

            async function main() {
              const adminEmail = process.env.SEED_ADMIN_EMAIL;
              const adminPassword = process.env.SEED_ADMIN_PASSWORD;
              const pubEmail = process.env.SEED_PUBLIC_ADMIN_EMAIL;
              const pubPassword = process.env.SEED_PUBLIC_ADMIN_PASSWORD;
              if (!adminEmail || !adminPassword || !pubEmail || !pubPassword) {
                console.error('Missing SEED_* env vars');
                process.exit(1);
              }
              await upsertAdmin(adminEmail, adminPassword, false);
              await upsertAdmin(pubEmail, pubPassword, true);
              console.log('Seeded admin and publicadmin users');
            }

            main()
              .catch((error) => {
                console.error(error);
                process.exit(1);
              })
              .finally(async () => {
                await prisma.$disconnect();
              });
            NODE
            docker cp /tmp/seed_admin_users.js ai-planner-backend:/app/seed_admin_users.js
            SEED_ADMIN_EMAIL=$(grep '^SEED_ADMIN_EMAIL=' "$ENV_FILE" | cut -d= -f2-)
            SEED_ADMIN_PASSWORD=$(grep '^SEED_ADMIN_PASSWORD=' "$ENV_FILE" | cut -d= -f2-)
            SEED_PUBLIC_ADMIN_EMAIL=$(grep '^SEED_PUBLIC_ADMIN_EMAIL=' "$ENV_FILE" | cut -d= -f2-)
            SEED_PUBLIC_ADMIN_PASSWORD=$(grep '^SEED_PUBLIC_ADMIN_PASSWORD=' "$ENV_FILE" | cut -d= -f2-)
            docker exec \
              -e SEED_ADMIN_EMAIL="$SEED_ADMIN_EMAIL" \
              -e SEED_ADMIN_PASSWORD="$SEED_ADMIN_PASSWORD" \
              -e SEED_PUBLIC_ADMIN_EMAIL="$SEED_PUBLIC_ADMIN_EMAIL" \
              -e SEED_PUBLIC_ADMIN_PASSWORD="$SEED_PUBLIC_ADMIN_PASSWORD" \
              ai-planner-backend sh -lc 'cd /app && node seed_admin_users.js'
            rm -f /tmp/seed_admin_users.js
