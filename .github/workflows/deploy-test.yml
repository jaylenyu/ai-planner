name: Deploy to Test (canary)

on:
  workflow_run:
    workflows: ["Deploy Canary"]
    types: [completed]
    branches: [canary]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-planner-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-planner-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2 (test.date-planner.us)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Get changed paths from triggering workflow
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const backendBuilt = jobs.data.jobs.some(
              (j) => j.name === 'Build & Push Canary Backend Image' && j.conclusion === 'success'
            );
            const frontendBuilt = jobs.data.jobs.some(
              (j) => j.name === 'Build & Push Canary Frontend Image' && j.conclusion === 'success'
            );
            core.setOutput('backend_changed', backendBuilt ? 'true' : 'false');
            core.setOutput('frontend_changed', frontendBuilt ? 'true' : 'false');

      - name: Pull images and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -euo pipefail
            STACK_DIR=/srv/apps/ai-planner-test
            COMPOSE_FILE=$STACK_DIR/compose.yml
            ENV_FILE=$STACK_DIR/.env
            BACKEND_CHANGED=${{ steps.changed.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ steps.changed.outputs.frontend_changed }}

            upsert_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
              fi
            }

            upsert_env NEXT_PUBLIC_TOSS_CLIENT_KEY '${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}'
            upsert_env NEXT_PUBLIC_SENTRY_DSN '${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}'
            upsert_env SENTRY_DSN '${{ secrets.SENTRY_DSN }}'
            upsert_env SENTRY_AUTH_TOKEN '${{ secrets.SENTRY_AUTH_TOKEN }}'
            upsert_env SENTRY_ORG '${{ secrets.SENTRY_ORG }}'
            upsert_env SENTRY_PROJECT '${{ secrets.SENTRY_PROJECT }}'
            upsert_env TOSS_SECRET_KEY '${{ secrets.TOSS_SECRET_KEY }}'
            upsert_env TOSS_WEBHOOK_SECRET '${{ secrets.TOSS_WEBHOOK_SECRET }}'
            upsert_env AWS_REGION '${{ secrets.AWS_REGION }}'
            upsert_env AWS_ACCESS_KEY_ID '${{ secrets.AWS_ACCESS_KEY_ID }}'
            upsert_env AWS_SECRET_ACCESS_KEY '${{ secrets.AWS_SECRET_ACCESS_KEY }}'

            docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" config >/dev/null
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            sudo journalctl --vacuum-size=100M 2>/dev/null || true
            docker image prune -af >/dev/null 2>&1 || true

            SERVICES=""
            if [ "$BACKEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_BACKEND }}:canary
              SERVICES="$SERVICES backend"
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              docker pull ${{ env.IMAGE_FRONTEND }}:canary
              SERVICES="$SERVICES frontend"
            fi

            if [ -z "$SERVICES" ]; then
              echo "No services to update — skipping"
              exit 0
            fi

            docker compose \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              up -d --no-build $SERVICES

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -euo pipefail
            BACKEND_CHANGED=${{ steps.changed.outputs.backend_changed }}
            FRONTEND_CHANGED=${{ steps.changed.outputs.frontend_changed }}
            MAX_RETRY=20

            wait_for_health() {
              CONTAINER_NAME="$1"
              LABEL="$2"
              COUNT=0
              until docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null | grep -q "healthy"; do
                COUNT=$((COUNT + 1))
                if [ "$COUNT" -ge "$MAX_RETRY" ]; then
                  echo "$LABEL failed to become healthy"
                  docker logs --tail 30 "$CONTAINER_NAME"
                  exit 1
                fi
                echo "Waiting for $LABEL... ($COUNT/$MAX_RETRY)"
                sleep 3
              done
              echo "$LABEL healthy!"
            }

            if [ "$BACKEND_CHANGED" = "true" ]; then
              wait_for_health ai-planner-backend-test backend-test
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              wait_for_health ai-planner-frontend-test frontend-test
            fi

            echo "Test deploy complete!"
            docker compose -f /srv/apps/ai-planner-test/compose.yml --env-file /srv/apps/ai-planner-test/.env ps

      - name: Smoke test
        if: ${{ steps.changed.outputs.backend_changed == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -e
            START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            TOKEN=$(docker exec ai-planner-backend-test node -e "const {PrismaClient}=require('@prisma/client'); const jwt=require('jsonwebtoken'); (async()=>{ const prisma=new PrismaClient(); const user=await prisma.user.findFirst({select:{id:true,email:true}}); if(!user){console.log('NO_USER_SKIP'); process.exit(0);} if(!process.env.JWT_SECRET){console.error('NO_JWT_SECRET'); process.exit(3);} const token=jwt.sign({sub:user.id,email:user.email}, process.env.JWT_SECRET, {expiresIn:'10m'}); console.log(token); await prisma.\$disconnect(); })().catch(async(e)=>{console.error(e?.message||e); process.exit(4);});")

            if [ -z "$TOKEN" ] || [ "$TOKEN" = "NO_USER_SKIP" ]; then
              echo "[smoke] No users in test DB — skipping smoke test"
              exit 0
            fi

            docker exec -e TOKEN="$TOKEN" ai-planner-backend-test node -e "(async()=>{const r=await fetch('http://localhost:4000/api/plan/generate',{method:'POST',headers:{Authorization:'Bearer '+process.env.TOKEN,'Content-Type':'application/json'},body:JSON.stringify({rawInput:'연남동에서 피자 먹고 싶어.',mode:'date'})}); if(!r.ok){console.error('SMOKE_STATUS_'+r.status); process.exit(1);} console.log('SMOKE_STATUS_'+r.status);})().catch((e)=>{console.error(e?.message||e);process.exit(1);});"

            sleep 2
            LOGS=$(docker logs --since "$START_TS" ai-planner-backend-test 2>&1 || true)
            echo "$LOGS" | tail -120

            if echo "$LOGS" | grep -q "Kakao REST API 키 없음"; then
              echo "[smoke] FAIL: Kakao REST API key warning exists"
              exit 1
            fi

            echo "[smoke] PASS"
